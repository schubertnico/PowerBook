name: powerbook

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powerbook_web
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ../logs:/var/log/php
    depends_on:
      - db
      - mail
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - powerbook_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: powerbook_db
    ports:
      - "3314:3306"
    environment:
      MYSQL_ROOT_PASSWORD: powerbook_root
      MYSQL_DATABASE: powerbook
      MYSQL_USER: powerbook
      MYSQL_PASSWORD: powerbook_secret
    volumes:
      - powerbook_mysql_data:/var/lib/mysql
    networks:
      - powerbook_network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  mail:
    image: axllent/mailpit
    container_name: powerbook_mail
    ports:
      - "1031:1025"
      - "8031:8025"
    networks:
      - powerbook_network
    restart: unless-stopped

networks:
  powerbook_network:
    driver: bridge

volumes:
  powerbook_mysql_data:
